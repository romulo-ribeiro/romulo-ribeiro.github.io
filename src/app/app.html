<div class="page-shell">
  <app-site-header
    [navItems]="navItems()"
    [activeSection]="activeSection()"
    [isDarkMode]="isDarkMode()"
    [themeIcon]="isDarkMode() ? themeIcons.dark : themeIcons.light"
    [themeToggleAriaLabel]="headerContent().themeToggleAria"
    [currentLanguage]="language()"
    [languageLabel]="headerContent().languageLabel"
    [languageOptions]="languageOptions"
    (darkModeChange)="setDarkMode($event)"
    (languageChange)="setLanguage($event)"
  />

  <main [class.language-transition]="isLanguageAnimating()">
    <section class="page-section page-section--hero" id="top" data-section="top">
      <app-hero-section [content]="heroContent()" [stats]="stats()" />
    </section>

    <section class="page-section" id="about" data-section="about">
      <app-about-section [content]="aboutContent()" />
    </section>

    <section class="page-section" id="projects" data-section="projects">
      <app-projects-section [content]="projectsContent()" [workCards]="workCards()" />
    </section>

    <section class="page-section" id="skills" data-section="skills">
      <app-skills-section [content]="skillsContent()" [stack]="stack()" [principles]="principles()" />
    </section>

    <section class="page-section" id="contact" data-section="contact">
      <app-contact-section [content]="contactContent()" [contactLinks]="contactLinks()" />
    </section>
  </main>
</div>

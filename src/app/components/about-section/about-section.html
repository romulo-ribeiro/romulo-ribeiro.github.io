<section class="section-shell">
  <div class="section-heading">
    <p class="eyebrow">{{ content().eyebrow }}</p>
    <h2>{{ content().title }}</h2>
  </div>

  <div class="about-grid">
    <div class="about-copy">
      <p class="about-text">{{ content().body }}</p>
    </div>

    <blockquote class="quote">
      {{ content().quote }}
    </blockquote>
  </div>
</section>
